<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Babyflo</title>
  <!-- Use same favicon as index -->
  <link rel="icon" type="image/png" href="images/logo.png" sizes="32x32">
  <link rel="shortcut icon" href="images/logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">
  <meta name="theme-color" content="#ff5f8f">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;font-family:'Poppins',sans-serif}
    body{background:#fdf6f8;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
    .card{width:100%;max-width:600px;background:#fff;padding:28px;border-radius:14px;border:1px solid #ffeef2}
    h2{color:#ff5f8f;text-align:center;margin-bottom:18px}
    .form-group{display:flex;flex-direction:column;margin-bottom:14px}
    label{font-size:0.85rem;color:#666;margin-bottom:6px}
    input,textarea{padding:12px;border:1px solid #ddd;border-radius:10px;background:#fafafa;resize:vertical}
    button{background:linear-gradient(135deg,#ff7fa2,#ff5f8f);color:#fff;border:none;padding:12px 16px;border-radius:10px;cursor:pointer;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <h2>Contact Us</h2>
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" required />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="6" required></textarea>
      </div>
      <div style="text-align:center">
        <button type="submit">Send Message</button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        Name: document.getElementById('name').value.trim(),
        Email: document.getElementById('email').value.trim(),
        Message: document.getElementById('message').value.trim()
      };

      try {
        const res = await fetch('http://localhost:5190/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          alert('Message sent!');
          document.getElementById('contactForm').reset();
        } else {
          const err = await res.text();
          console.error('Contact error:', err);
          alert('Failed to send message.');
        }
      } catch (err) {
        console.error('Network error:', err);
        alert('Network error. Check console.');
      }
    });
  </script>
</body>
</html>
